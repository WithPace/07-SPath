<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星途AI — M-CHAT 筛查</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #7C4DFF;
  --primary-light: #B388FF;
  --bg: #F5F3FF;
  --glass-white: rgba(255,255,255,0.88);
  --glass-card: rgba(255,255,255,0.85);
  --text: #1A1A2E;
  --text-secondary: #6B7280;
  --radius: 16px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 20px;
}
.phone-frame {
  width: 420px; height: 900px;
  background: var(--bg);
  border-radius: 40px;
  box-shadow: 0 25px 80px rgba(124,77,255,0.15), 0 0 0 1px rgba(124,77,255,0.08);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

/* 顶部导航 */
.nav-bar {
  padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(124,77,255,0.08);
  position: relative; z-index: 10; flex-shrink: 0;
}
.nav-back {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--glass-white);
  backdrop-filter: blur(10px);
  border: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 18px; cursor: pointer; flex-shrink: 0;
  transition: transform 0.2s;
}
.nav-back:active { transform: scale(0.92); }
.nav-title {
  flex: 1; font-size: 17px; font-weight: 600;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-progress {
  font-size: 13px; color: var(--text-secondary); font-weight: 500;
  background: rgba(124,77,255,0.08); padding: 4px 10px; border-radius: 10px;
}

/* 进度条 */
.progress-bar-wrap {
  height: 3px; background: rgba(124,77,255,0.08); flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #E040FB);
  border-radius: 0 2px 2px 0;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

/* 消息区域 */
.messages {
  flex: 1; overflow-y: auto; padding: 16px 16px 8px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 0; }

/* 消息行 */
.msg-row { display: flex; gap: 10px; margin-bottom: 16px; max-width: 88%; animation: msgIn 0.4s ease; }
.msg-row.ai { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; margin-left: auto; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.avatar {
  width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; overflow: hidden;
}
.avatar.ai-avatar {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}
.avatar.ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar.user-avatar {
  background: linear-gradient(135deg, #FFD54F, #FF8A65);
}
.bubble {
  padding: 12px 16px; font-size: 15px; line-height: 1.65;
  word-break: break-word;
}
.ai .bubble {
  background: var(--glass-white);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(124,77,255,0.08);
  border-radius: 4px 16px 16px 16px;
  box-shadow: 0 2px 12px rgba(124,77,255,0.06);
}
.user .bubble {
  background: #EDE7F6;
  border-radius: 16px 16px 4px 16px;
}
.bubble strong { color: var(--primary); font-weight: 600; }

/* 分隔线 */
.divider {
  text-align: center; padding: 20px 0; color: var(--text-secondary);
  font-size: 13px; position: relative; margin: 8px 0;
}
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%; height: 1px; width: 28%;
  background: linear-gradient(90deg, transparent, rgba(124,77,255,0.08), transparent);
}
.divider::before { left: 5%; }
.divider::after { right: 5%; }

/* 评估结果卡片 */
.result-card {
  background: var(--glass-card);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(124,77,255,0.1);
  border-radius: var(--radius);
  padding: 20px; margin-top: 12px;
  box-shadow: 0 4px 20px rgba(124,77,255,0.06);
}
.result-card .card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.result-card .card-title { font-size: 15px; font-weight: 600; color: var(--text); }
.result-card .risk-tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: rgba(76,175,80,0.12); color: #4CAF50;
}
.result-card .scores {
  display: flex; gap: 16px; margin-bottom: 16px;
}
.result-card .score-item {
  flex: 1; text-align: center; padding: 12px;
  background: rgba(124,77,255,0.04); border-radius: 12px;
}
.result-card .score-value {
  font-size: 24px; font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.result-card .score-label {
  font-size: 12px; color: var(--text-secondary); margin-top: 4px;
}
.result-card .card-actions {
  display: flex; gap: 10px;
}
.result-card .card-btn {
  flex: 1; padding: 10px; border-radius: 12px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.result-card .card-btn.primary {
  background: linear-gradient(135deg, var(--primary), #E040FB); color: #fff;
  box-shadow: 0 4px 16px rgba(124,77,255,0.3);
}
.result-card .card-btn.primary:active { transform: scale(0.96); }
.result-card .card-btn.secondary {
  background: rgba(124,77,255,0.08); color: var(--primary);
  border: 1px solid rgba(124,77,255,0.15);
}
.result-card .card-btn.secondary:active { transform: scale(0.96); }

/* 底部快捷回答 */
.quick-reply-bar {
  padding: 12px 16px 28px; flex-shrink: 0;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(124,77,255,0.06);
}
.quick-reply-hint {
  text-align: center; font-size: 12px; color: var(--text-secondary);
  margin-bottom: 10px;
}
.quick-btns { display: flex; gap: 10px; justify-content: center; }
.quick-btn {
  flex: 1; max-width: 120px; padding: 12px 0; border-radius: 20px;
  border: none; font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.25s ease; display: flex; align-items: center;
  justify-content: center; gap: 6px;
}
.quick-btn.yes {
  background: rgba(76,175,80,0.08); color: #4CAF50;
  border: 1.5px solid rgba(76,175,80,0.3);
}
.quick-btn.yes:hover { background: rgba(76,175,80,0.15); }
.quick-btn.yes:active { transform: scale(0.95); }
.quick-btn.no {
  background: rgba(244,67,54,0.08); color: #F44336;
  border: 1.5px solid rgba(244,67,54,0.3);
}
.quick-btn.no:hover { background: rgba(244,67,54,0.15); }
.quick-btn.no:active { transform: scale(0.95); }
.quick-btn.unsure {
  background: rgba(107,114,128,0.06); color: var(--text-secondary);
  border: 1.5px solid rgba(107,114,128,0.2);
}
.quick-btn.unsure:hover { background: rgba(107,114,128,0.12); }
.quick-btn.unsure:active { transform: scale(0.95); }
.quick-btns.hidden { display: none; }

/* 输入框（结果阶段显示） */
.input-bar {
  display: none; padding: 0 16px 28px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(124,77,255,0.06);
}
.input-bar.show { display: flex; gap: 10px; align-items: center; padding-top: 12px; }
.input-field {
  flex: 1; padding: 12px 16px; border-radius: 20px;
  background: #fff; border: 1.5px solid rgba(124,77,255,0.12);
  color: var(--text); font-size: 15px; font-family: inherit; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-field:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(124,77,255,0.08);
}
.input-field::placeholder { color: #B0B0C0; }
.send-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  border: none; color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(124,77,255,0.3);
  transition: all 0.2s;
}
.send-btn:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(124,77,255,0.2); }

/* 打字动画 */
.typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
.typing-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--primary-light); animation: blink 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1); }
}

/* 响应式 */
@media (max-width: 460px) {
  body { padding: 0; }
  .phone-frame {
    width: 100%; height: 100vh;
    border-radius: 0; box-shadow: none;
  }
}
</style>
</head>
<body>
<div class="phone-frame">
  <!-- 顶部导航 -->
  <div class="nav-bar">
    <button class="nav-back" onclick="history.back()">←</button>
    <div class="nav-title">M-CHAT 筛查</div>
    <div class="nav-progress" id="navProgress">0/20</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>

  <!-- 消息区域 -->
  <div class="messages" id="messages"></div>

  <!-- 底部快捷回答 -->
  <div class="quick-reply-bar" id="quickReplyBar">
    <div class="quick-reply-hint">请选择您的回答</div>
    <div class="quick-btns" id="quickBtns">
      <button class="quick-btn yes" onclick="answer('yes')">是 ✓</button>
      <button class="quick-btn no" onclick="answer('no')">否 ✗</button>
      <button class="quick-btn unsure" onclick="answer('unsure')">不确定 ?</button>
    </div>
  </div>

  <!-- 输入框 -->
  <div class="input-bar" id="inputBar">
    <input class="input-field" placeholder="输入消息..." id="inputField">
    <button class="send-btn" onclick="sendInput()">↑</button>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const progressFill = document.getElementById('progressFill');
const navProgress = document.getElementById('navProgress');
const quickBtns = document.getElementById('quickBtns');
const quickReplyBar = document.getElementById('quickReplyBar');
const inputBar = document.getElementById('inputBar');

let currentQuestion = 0;
const totalQuestions = 20;
const answers = {};
let isAnimating = false;
let waitingForClick = false;
let interactiveQNum = 0;

function updateProgress(num) {
  navProgress.textContent = num + '/' + totalQuestions;
  progressFill.style.width = (num / totalQuestions * 100) + '%';
}

function scrollToBottom() {
  requestAnimationFrame(function() { messages.scrollTop = messages.scrollHeight; });
}

function showQuickBtns(show) {
  quickBtns.className = show ? 'quick-btns' : 'quick-btns hidden';
}

function addMessage(type, content, typing) {
  return new Promise(function(resolve) {
    var row = document.createElement('div');
    row.className = 'msg-row ' + type;

    var avatar = document.createElement('div');
    if (type === 'ai') {
      avatar.className = 'avatar ai-avatar';
      avatar.innerHTML = '<img src="https://api.dicebear.com/9.x/fun-emoji/svg?seed=starpath-ai&mouth=cute&eyes=cute" alt="AI">';
    } else {
      avatar.className = 'avatar user-avatar';
      avatar.textContent = '👩';
    }

    var bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (typing) {
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      row.appendChild(avatar);
      row.appendChild(bubble);
      messages.appendChild(row);
      scrollToBottom();
      setTimeout(function() {
        bubble.innerHTML = content;
        scrollToBottom();
        resolve();
      }, 800 + Math.random() * 600);
    } else {
      bubble.innerHTML = content;
      row.appendChild(avatar);
      row.appendChild(bubble);
      messages.appendChild(row);
      scrollToBottom();
      resolve();
    }
  });
}

function addResultCard() {
  return new Promise(function(resolve) {
    var row = document.createElement('div');
    row.className = 'msg-row ai';

    var avatar = document.createElement('div');
    avatar.className = 'avatar ai-avatar';
    avatar.innerHTML = '<img src="https://api.dicebear.com/9.x/fun-emoji/svg?seed=starpath-ai&mouth=cute&eyes=cute" alt="AI">';

    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.maxWidth = '85%';
    bubble.innerHTML =
      '所有问题都回答完了，我来分析一下结果。' +
      '<div class="result-card">' +
        '<div class="card-header">' +
          '<div class="card-title">M-CHAT-R/F 筛查结果</div>' +
          '<div class="risk-tag">低风险</div>' +
        '</div>' +
        '<div class="scores">' +
          '<div class="score-item"><div class="score-value">3</div><div class="score-label">总分</div></div>' +
          '<div class="score-item"><div class="score-value">0</div><div class="score-label">关键题未通过</div></div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="card-btn primary">查看详细报告</button>' +
          '<button class="card-btn secondary">分享给医生</button>' +
        '</div>' +
      '</div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messages.appendChild(row);
    scrollToBottom();
    setTimeout(resolve, 100);
  });
}

function addDivider(text) {
  var div = document.createElement('div');
  div.className = 'divider';
  div.textContent = text;
  messages.appendChild(div);
  scrollToBottom();
}

// 交互式问题
var interactiveQuestions = [
  { num: 1, text: '好的，第一个问题：<br><br><strong>如果您指向房间另一边的东西，乐乐会看吗？</strong><br><br>比如您指着一个玩具或一只小动物，他会顺着您手指的方向看过去吗？' },
  { num: 2, text: '好的 ✓<br><br><strong>您是否曾怀疑乐乐可能有听力问题？</strong><br><br>比如叫他名字没反应，或者对声音不敏感？' },
  { num: 3, text: '<strong>乐乐会玩假装游戏吗？</strong><br><br>比如假装用杯子喝水，假装给娃娃喂饭，假装打电话？' },
  { num: 4, text: '明白了，记为"是" ✓<br><br><strong>第4题：乐乐喜欢爬东西吗？</strong><br><br>比如爬楼梯、爬沙发、爬滑梯？' }
];

var userAnswerTexts = ['是 ✓', '否 ✗', '他有时候会假装打电话', '是 ✓'];

// 启动流程
async function startFlow() {
  showQuickBtns(false);
  await addMessage('ai', '我来帮您做一个 M-CHAT-R/F 自闭症风险筛查。这个量表有20个问题，每个问题您回答"是"或"否"就好。整个过程大约需要5-10分钟。<br><br>准备好了吗？', true);

  await new Promise(function(r) { setTimeout(r, 1200); });
  await addMessage('user', '好的，开始吧');
  await new Promise(function(r) { setTimeout(r, 400); });

  // 第1题
  await addMessage('ai', interactiveQuestions[0].text, true);
  updateProgress(1);
  interactiveQNum = 1;
  showQuickBtns(true);
  waitingForClick = true;
  isAnimating = false;
}

async function answer(type) {
  if (isAnimating || !waitingForClick) return;
  waitingForClick = false;
  isAnimating = true;
  showQuickBtns(false);

  var qIdx = interactiveQNum - 1;
  var userText;
  if (qIdx === 2) {
    userText = '他有时候会假装打电话';
  } else {
    userText = type === 'yes' ? '是 ✓' : type === 'no' ? '否 ✗' : '不确定 ?';
  }

  answers[interactiveQNum] = type;
  await addMessage('user', userText);
  await new Promise(function(r) { setTimeout(r, 400); });

  var nextQIdx = interactiveQNum;
  if (nextQIdx < interactiveQuestions.length) {
    var nextQ = interactiveQuestions[nextQIdx];
    await addMessage('ai', nextQ.text, true);
    updateProgress(nextQ.num);
    interactiveQNum = nextQ.num;
    showQuickBtns(true);
    waitingForClick = true;
    isAnimating = false;
  } else {
    await showRemainingFlow();
  }
}

async function showRemainingFlow() {
  showQuickBtns(false);
  await new Promise(function(r) { setTimeout(r, 600); });

  addDivider('··· 第5-19题 ···');
  await new Promise(function(r) { setTimeout(r, 800); });

  await addMessage('ai', '最后一题了！<br><br><strong>乐乐喜欢运动类活动吗？</strong><br><br>比如被摇晃、在膝盖上弹跳、荡秋千？', true);
  updateProgress(20);
  interactiveQNum = 20;
  showQuickBtns(true);
  waitingForClick = true;
  isAnimating = false;

  var origAnswer = window.answer;
  window.answer = async function(type) {
    if (isAnimating || !waitingForClick) return;
    waitingForClick = false;
    isAnimating = true;
    showQuickBtns(false);

    await addMessage('user', '喜欢');
    await new Promise(function(r) { setTimeout(r, 600); });

    await addResultCard();
    await new Promise(function(r) { setTimeout(r, 800); });

    await addMessage('ai', '乐乐的筛查结果是<strong>低风险</strong>，这是个好消息 🎉<br><br>不过筛查只是初步参考，建议您：<br>1. 定期复查（每3-6个月）<br>2. 继续关注社交和沟通发展<br>3. 如有疑虑随时咨询医生', true);

    updateProgress(20);
    quickReplyBar.style.display = 'none';
    inputBar.classList.add('show');
    isAnimating = false;
  };
}

function sendInput() {
  var val = document.getElementById('inputField').value.trim();
  if (!val) return;
  addMessage('user', val);
  document.getElementById('inputField').value = '';
}

document.getElementById('inputField').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendInput();
});

startFlow();
</script>
</body>
</html>
