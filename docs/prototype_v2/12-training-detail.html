<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星途AI — 详细训练记录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #7C4DFF;
  --primary-light: #B388FF;
  --bg: #F5F3FF;
  --glass-white: rgba(255,255,255,0.88);
  --glass-card: rgba(255,255,255,0.85);
  --text: #1A1A2E;
  --text-secondary: #6B7280;
  --radius: 16px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 20px;
}
.phone-frame {
  width: 420px; height: 900px; background: var(--bg);
  border-radius: 40px;
  box-shadow: 0 25px 80px rgba(124,77,255,0.15), 0 0 0 1px rgba(124,77,255,0.08);
  display: flex; flex-direction: column; overflow: hidden; position: relative;
}
.nav-bar {
  display: flex; align-items: center; justify-content: center;
  padding: 16px 20px 12px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(124,77,255,0.08);
  flex-shrink: 0; z-index: 10; position: relative;
}
.nav-back {
  position: absolute; left: 20px;
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: var(--glass-white); backdrop-filter: blur(10px);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.nav-back:active { transform: scale(0.92); }
.nav-back svg { width: 20px; height: 20px; stroke: var(--text); stroke-width: 2; fill: none; }
.nav-title {
  font-size: 17px; font-weight: 600;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-action {
  position: absolute; right: 20px; border: none; background: none;
  font-size: 14px; font-weight: 600; color: var(--primary);
  cursor: pointer; padding: 4px 8px; font-family: inherit;
}
.nav-action:active { opacity: 0.6; }

/* 周切换 + 日期导航 */
.week-nav {
  flex-shrink: 0; background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(124,77,255,0.06);
  z-index: 5;
}
.week-switcher {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  padding: 10px 16px 6px;
}
.week-arrow {
  width: 32px; height: 32px; border-radius: 10px; border: none;
  background: var(--glass-white); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.week-arrow:active { transform: scale(0.9); }
.week-arrow:disabled { opacity: 0.3; cursor: default; }
.week-arrow:disabled:active { transform: none; }
.week-arrow svg { width: 16px; height: 16px; stroke: var(--text); stroke-width: 2; fill: none; }
.week-label { font-size: 14px; font-weight: 600; color: var(--text); min-width: 160px; text-align: center; }
.week-label span { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

/* 周概览 */
.week-stats {
  display: flex; gap: 6px; padding: 8px 16px;
}
.week-stat {
  flex: 1; text-align: center; padding: 8px 2px;
  background: var(--glass-white); border-radius: 10px;
  border: 1px solid rgba(124,77,255,0.06);
}
.week-stat-val {
  font-size: 17px; font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.week-stat-label { font-size: 9px; color: var(--text-secondary); margin-top: 1px; }

/* 日期锚点导航 */
.day-anchors {
  display: flex; gap: 4px; padding: 8px 16px 10px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.day-anchors::-webkit-scrollbar { display: none; }
.day-anchor {
  flex-shrink: 0; padding: 6px 0; width: 48px; border: none; border-radius: 10px;
  background: transparent; cursor: pointer; text-align: center;
  font-family: inherit; transition: all 0.2s;
}
.day-anchor .da-week { font-size: 10px; color: var(--text-secondary); }
.day-anchor .da-date { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-top: 1px; }
.day-anchor .da-dot { width: 5px; height: 5px; border-radius: 50%; margin: 3px auto 0; }
.day-anchor .da-dot.green { background: #4CAF50; }
.day-anchor .da-dot.yellow { background: #FF9800; }
.day-anchor .da-dot.gray { background: #D1D5DB; }
.day-anchor.active { background: linear-gradient(135deg, var(--primary), #E040FB); }
.day-anchor.active .da-week { color: rgba(255,255,255,0.7); }
.day-anchor.active .da-date { color: #fff; }
.day-anchor.active .da-dot { background: rgba(255,255,255,0.6); }

/* 滚动内容 */
.scroll-area {
  flex: 1; overflow-y: auto; padding: 16px;
  scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
}
.scroll-area::-webkit-scrollbar { width: 0; }

/* 日期分隔 */
.day-section { margin-bottom: 24px; }
.day-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  position: sticky; top: -1px; z-index: 2;
  background: var(--bg); padding: 8px 0 8px;
}
.day-header-icon {
  width: 32px; height: 32px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  display: flex; align-items: center; justify-content: center; font-size: 15px;
}
.day-header-info { flex: 1; }
.day-header-date { font-size: 15px; font-weight: 600; color: var(--text); }
.day-header-summary { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.day-header-score {
  padding: 4px 12px; border-radius: 10px; font-size: 13px; font-weight: 700;
  background: rgba(76,175,80,0.1); color: #4CAF50;
}
.day-header-score.mid { background: rgba(255,152,0,0.1); color: #FF9800; }
.day-header-score.rest { background: rgba(209,213,219,0.2); color: #9CA3AF; }

/* 训练项卡片 */
.session-card {
  background: var(--glass-white);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(124,77,255,0.08);
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(124,77,255,0.04);
}
.session-top { display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
.session-emoji { font-size: 24px; flex-shrink: 0; }
.session-info { flex: 1; min-width: 0; }
.session-name { font-size: 14px; font-weight: 600; color: var(--text); }
.session-time { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.session-badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.session-badge.high { background: rgba(76,175,80,0.1); color: #4CAF50; }
.session-badge.mid { background: rgba(255,152,0,0.1); color: #FF9800; }
.session-detail { padding: 0 16px 14px; }
.detail-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 13px; line-height: 1.5; }
.detail-row + .detail-row { border-top: 1px solid rgba(124,77,255,0.04); }
.detail-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); min-width: 48px; flex-shrink: 0; padding-top: 1px; }
.detail-content { color: var(--text); flex: 1; }
.detail-content strong { color: var(--primary); }
.goal-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.goal-bar { flex: 1; height: 6px; background: rgba(124,77,255,0.08); border-radius: 3px; overflow: hidden; }
.goal-fill { height: 100%; border-radius: 3px; }
.goal-fill.purple { background: linear-gradient(90deg, var(--primary), #E040FB); }
.goal-fill.blue { background: linear-gradient(90deg, #2196F3, #42A5F5); }
.goal-fill.green { background: linear-gradient(90deg, #4CAF50, #66BB6A); }
.goal-pct { font-size: 12px; font-weight: 600; color: var(--primary); min-width: 32px; text-align: right; }
.tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tag { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.tag.green { background: rgba(76,175,80,0.08); color: #4CAF50; }
.tag.orange { background: rgba(255,152,0,0.08); color: #FF9800; }
.tag.blue { background: rgba(33,150,243,0.08); color: #2196F3; }
.tag.purple { background: rgba(124,77,255,0.08); color: var(--primary); }

/* AI 小结 */
.ai-summary {
  background: linear-gradient(135deg, rgba(124,77,255,0.06), rgba(224,64,251,0.04));
  border: 1px solid rgba(124,77,255,0.1);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px;
}
.ai-summary-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ai-summary-avatar {
  width: 24px; height: 24px; border-radius: 8px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.ai-summary-avatar img { width: 100%; height: 100%; object-fit: cover; }
.ai-summary-label { font-size: 12px; font-weight: 600; color: var(--primary); }
.ai-summary-text { font-size: 13px; line-height: 1.7; color: var(--text); }
.ai-summary-text strong { color: var(--primary); }

/* 底部 */
.bottom-bar {
  flex-shrink: 0; padding: 12px 16px 28px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(124,77,255,0.06);
  display: flex; gap: 10px;
}
.bottom-btn {
  flex: 1; padding: 12px; border-radius: 14px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; text-align: center;
  font-family: inherit; transition: all 0.2s;
}
.bottom-btn.primary {
  background: linear-gradient(135deg, var(--primary), #E040FB); color: #fff;
  box-shadow: 0 4px 16px rgba(124,77,255,0.3);
}
.bottom-btn.primary:active { transform: scale(0.96); }
.bottom-btn.secondary {
  background: rgba(124,77,255,0.08); color: var(--primary);
  border: 1px solid rgba(124,77,255,0.15);
}
.bottom-btn.secondary:active { transform: scale(0.96); }
.toast {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.85);
  background: rgba(0,0,0,0.75); color: #fff;
  padding: 10px 24px; border-radius: 10px; font-size: 14px;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: all 0.25s ease; white-space: nowrap; backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
@media (max-width: 460px) {
  body { padding: 0; }
  .phone-frame { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
}
</style>
</head>

var currentWeek = 2; // 默认本周

function renderWeek(idx) {
  var w = weeksData[idx];
  document.getElementById('weekLabel').innerHTML = w.label + ' <span>' + w.tag + '</span>';
  document.getElementById('wsDays').textContent = w.stats.days;
  document.getElementById('wsItems').textContent = w.stats.items;
  document.getElementById('wsScore').textContent = w.stats.score;
  document.getElementById('wsRate').textContent = w.stats.rate;
  document.getElementById('prevWeek').disabled = (idx === 0);
  document.getElementById('nextWeek').disabled = (idx === weeksData.length - 1);

  // 渲染日期锚点
  var anchorsHtml = '';
  w.days.forEach(function(d, i) {
    anchorsHtml += '<button class="day-anchor' + (i===0?' active':'') + '" onclick="scrollToDay('+i+',this)"><div class="da-week">'+d.week+'</div><div class="da-date">'+d.date+'</div><div class="da-dot '+d.dot+'"></div></button>';
  });
  document.getElementById('dayAnchors').innerHTML = anchorsHtml;

  // 渲染所有天的内容
  var html = '';
  w.days.forEach(function(d, i) {
    html += '<div class="day-section" id="daySection'+i+'">';
    html += '<div class="day-header"><div class="day-header-icon">📋</div><div class="day-header-info"><div class="day-header-date">'+d.dateStr+'</div><div class="day-header-summary">'+d.summary+'</div></div><div class="day-header-score'+(d.scoreCls?' '+d.scoreCls:'')+'">'+d.score+'</div></div>';

    // 训练卡片
    if (d.sessions && d.sessions.length > 0) {
      d.sessions.forEach(function(s) {
        html += '<div class="session-card"><div class="session-top"><div class="session-emoji">'+s.emoji+'</div><div class="session-info"><div class="session-name">'+s.name+'</div><div class="session-time">'+s.time+'</div></div><div class="session-badge '+s.badgeCls+'">'+s.badge+'</div></div><div class="session-detail">';
        s.rows.forEach(function(r) {
          html += '<div class="detail-row"><div class="detail-label">'+r.l+'</div><div class="detail-content">'+r.c;
          if (r.bar !== undefined) {
            html += '<div class="goal-wrap"><div class="goal-bar"><div class="goal-fill '+r.barCls+'" style="width:'+r.bar+'%"></div></div><div class="goal-pct">'+r.bar+'%</div></div>';
          }
          if (r.tags) {
            html += '<div class="tags">';
            r.tags.forEach(function(t) {
              var parts = t.split('|');
              html += '<span class="tag '+parts[0]+'">'+parts[1]+'</span>';
            });
            html += '</div>';
          }
          html += '</div></div>';
        });
        html += '</div></div>';
      });
    }

    // AI小结
    html += '<div class="ai-summary"><div class="ai-summary-header"><div class="ai-summary-avatar"><img src="https://api.dicebear.com/9.x/fun-emoji/svg?seed=starpath-ai&mouth=cute&eyes=cute" alt="AI"></div><div class="ai-summary-label">AI '+(d.scoreCls==='rest'?'提示':'当日小结')+'</div></div><div class="ai-summary-text">'+d.aiSummary+'</div></div>';
    html += '</div>';
  });

  var area = document.getElementById('scrollArea');
  area.innerHTML = html;
  area.scrollTop = 0;
}

function changeWeek(dir) {
  var next = currentWeek + dir;
  if (next < 0 || next >= weeksData.length) return;
  currentWeek = next;
  renderWeek(currentWeek);
}

function scrollToDay(idx, el) {
  document.querySelectorAll('.day-anchor').forEach(function(a){ a.classList.remove('active'); });
  el.classList.add('active');
  var target = document.getElementById('daySection' + idx);
  if (target) {
    var area = document.getElementById('scrollArea');
    area.scrollTo({ top: target.offsetTop - area.offsetTop - 8, behavior: 'smooth' });
  }
}

// 滚动时高亮对应日期
document.getElementById('scrollArea').addEventListener('scroll', function() {
  var area = this;
  var anchors = document.querySelectorAll('.day-anchor');
  var sections = document.querySelectorAll('.day-section');
  var scrollTop = area.scrollTop + 20;
  var activeIdx = 0;
  sections.forEach(function(s, i) {
    if (s.offsetTop - area.offsetTop <= scrollTop) activeIdx = i;
  });
  anchors.forEach(function(a, i) {
    a.classList.toggle('active', i === activeIdx);
  });
});

// 初始渲染本周
renderWeek(currentWeek);
</script>
