<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星途AI — 首页引导</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #7C4DFF;
  --primary-light: #B388FF;
  --bg: #F5F3FF;
  --glass-white: rgba(255,255,255,0.88);
  --glass-card: rgba(255,255,255,0.85);
  --text: #1A1A2E;
  --text-secondary: #6B7280;
  --radius: 16px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.phone-frame {
  width: 420px; height: 900px;
  background: var(--bg);
  border-radius: 40px;
  box-shadow: 0 25px 80px rgba(124,77,255,0.15), 0 0 0 1px rgba(124,77,255,0.08);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}
/* 顶部导航 */
.nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(124,77,255,0.08);
  flex-shrink: 0;
  z-index: 10;
}
.nav-left {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: none;
  background: var(--glass-white);
  backdrop-filter: blur(10px);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.nav-left:active { transform: scale(0.92); }
.nav-title {
  font-size: 17px; font-weight: 600;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
/* 小程序胶囊按钮 */
.nav-capsule {
  display: flex; align-items: center;
  height: 32px;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  overflow: hidden;
}
.nav-capsule-btn {
  width: 40px; height: 32px;
  border: none; background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.nav-capsule-btn:active { background: rgba(0,0,0,0.05); }
.nav-capsule-new svg {
  width: 16px; height: 16px;
  stroke: #555; stroke-width: 2; fill: none;
}
.nav-capsule-dots {
  display: flex; gap: 3px; align-items: center;
}
.nav-capsule-dots span {
  width: 4px; height: 4px; border-radius: 50%;
  background: #555;
}
.nav-capsule-divider {
  width: 1px; height: 18px;
  background: rgba(0,0,0,0.1);
}
/* 消息区域 */
.messages {
  flex: 1; overflow-y: auto; padding: 16px 16px 8px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
  align-items: center;
}
.messages::-webkit-scrollbar { width: 0; }

/* 角色区域 */
.mascot-area {
  display: flex; flex-direction: column; align-items: center;
  padding-top: 20px;
  width: 100%;
}
.mascot-container {
  width: 180px; height: 180px;
  border-radius: 50%;
  background: linear-gradient(145deg, #E8DEF8, #D1C4E9, #B39DDB);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  animation: float 3s ease-in-out infinite;
  box-shadow: 0 20px 60px rgba(124,77,255,0.15);
}
.mascot-container::after {
  content: '';
  position: absolute;
  bottom: -20px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 30px;
  background: radial-gradient(ellipse, rgba(124,77,255,0.12) 0%, transparent 70%);
  border-radius: 50%;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.mascot-star {
  font-size: 64px;
  filter: drop-shadow(0 4px 12px rgba(255,193,7,0.4));
}
.mascot-deco {
  position: absolute;
  animation: twinkle 2s ease-in-out infinite;
}
.mascot-deco:nth-child(2) {
  top: 12px; right: 16px;
  font-size: 24px;
  animation-delay: 0s;
}
.mascot-deco:nth-child(3) {
  bottom: 20px; left: 8px;
  font-size: 20px;
  animation-delay: 0.7s;
}
.mascot-deco:nth-child(4) {
  top: 30px; left: 14px;
  font-size: 18px;
  animation-delay: 1.3s;
}
@keyframes twinkle {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* 问候文字 */
.greeting {
  font-size: 18px; font-weight: 600;
  color: var(--text);
  margin-top: 24px;
  text-align: center;
}

/* AI气泡行 */
.msg-row { display: flex; gap: 10px; max-width: 88%; width: 100%; }
.msg-row.ai { align-self: flex-start; }
.avatar {
  width: 36px; height: 36px; border-radius: 12px;
  flex-shrink: 0; overflow: hidden;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  display: flex; align-items: center; justify-content: center;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.bubble {
  padding: 12px 16px;
  font-size: 15px; line-height: 1.65;
  word-break: break-word;
  position: relative;
}
.ai .bubble {
  background: var(--glass-white);
  backdrop-filter: blur(12px);
  border-radius: 4px 16px 16px 16px;
  box-shadow: 0 2px 12px rgba(124,77,255,0.06);
}
.bubble-text {
  margin-bottom: 12px;
  color: var(--text);
}

/* 引导按钮网格 */
.guide-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.guide-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(124,77,255,0.18);
  background: var(--glass-card);
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: all 0.2s;
}
.guide-btn:hover {
  border-color: var(--primary);
  background: rgba(124,77,255,0.06);
  box-shadow: 0 2px 12px rgba(124,77,255,0.1);
}
.guide-btn:active {
  transform: scale(0.96);
  background: rgba(124,77,255,0.1);
}
.guide-emoji {
  font-size: 22px;
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.guide-info {
  display: flex; flex-direction: column; gap: 1px;
  text-align: left;
}
.guide-title {
  font-size: 13px; font-weight: 600;
  color: var(--text);
}
.guide-desc {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.3;
}

/* 数据摘要条 */
.stats-bar {
  display: flex; gap: 8px;
  justify-content: center;
  width: 100%;
  padding: 0 4px;
}
.stat-chip {
  padding: 6px 12px;
  border-radius: 20px;
  background: var(--glass-card);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(124,77,255,0.1);
  font-size: 12px; font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}

/* 快捷操作 */
.quick-actions {
  flex-shrink: 0;
  padding: 8px 16px;
  overflow-x: auto;
  overflow-y: hidden;
  display: flex; gap: 8px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.quick-actions::-webkit-scrollbar { display: none; }
.quick-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(124,77,255,0.15);
  background: var(--glass-card);
  backdrop-filter: blur(16px);
  font-size: 13px; font-weight: 500;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.quick-btn:active {
  background: var(--primary);
  color: #fff;
  transform: scale(0.95);
}

/* 输入栏 */
.input-bar {
  flex-shrink: 0;
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 12px 28px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(124,77,255,0.06);
}
.input-wrap {
  flex: 1;
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid rgba(124,77,255,0.12);
  overflow: visible;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}
.input-wrap.focused {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(124,77,255,0.08);
}
.input-top {
  display: flex; align-items: flex-start;
  padding: 8px 10px 0; gap: 8px;
}
.input-voice {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(124,77,255,0.08);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s;
}
.input-voice:active { background: rgba(124,77,255,0.18); }
.input-field {
  flex: 1; min-height: 35px; max-height: 120px;
  border: none; background: transparent;
  padding: 4px 0; font-size: 15px; font-family: inherit;
  outline: none; resize: none; line-height: 1.4;
  overflow-y: auto;
}
.input-field::placeholder { color: #B0B0C0; }
.input-add {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid rgba(124,77,255,0.25);
  background: transparent; font-size: 18px; color: var(--primary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.input-add:active { background: rgba(124,77,255,0.08); }
.input-bottom {
  display: none; align-items: center;
  justify-content: space-between;
  padding: 0px 12px 7px;
}
.input-wrap.focused .input-bottom { display: flex; }
.input-wrap.focused .input-field { min-height: 64px; }
.child-switch {
  display: flex; align-items: center; gap: 3px;
  padding: 3px 9px; border-radius: 12px;
  border: 1px solid rgba(124,77,255,0.2);
  background: rgba(124,77,255,0.04);
  font-size: 11px; font-weight: 500; color: var(--primary);
  cursor: pointer; transition: background 0.15s; white-space: nowrap;
}
.child-switch:active { background: rgba(124,77,255,0.1); }
.view-profile {
  display: flex; align-items: center; gap: 2px;
  border: none; background: transparent;
  font-size: 11px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; padding: 3px 0; transition: color 0.15s;
}
.view-profile:hover { color: var(--primary); }
/* 孩子切换弹窗 */
.child-modal-overlay {
  position: absolute; bottom: 100%; left: 0; right: 0;
  z-index: 20; display: none;
}
.child-modal-overlay.show { display: block; }
.child-modal {
  background: #fff; border-radius: 14px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
  margin: 0 0 8px; padding: 12px;
  border: 1px solid rgba(124,77,255,0.08);
}
.child-modal-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 8px; padding-left: 2px;
}
.child-option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 8px; border-radius: 10px;
  cursor: pointer; transition: background 0.15s;
}
.child-option:hover { background: rgba(124,77,255,0.05); }
.child-option.active { background: rgba(124,77,255,0.08); }
.child-option-avatar {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.child-option-info { flex: 1; }
.child-option-name { font-size: 14px; font-weight: 600; color: var(--text); }
.child-option-desc { font-size: 11px; color: var(--text-secondary); }
.child-option-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid #D0D0D0;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.child-option.active .child-option-check {
  background: var(--primary); border-color: var(--primary);
}
.child-option.active .child-option-check::after {
  content: '✓'; color: #fff; font-size: 11px; font-weight: 700;
}
.send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--primary), #E040FB);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(124,77,255,0.3);
  transition: all 0.2s; margin-bottom: 2px;
}
.send-btn:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(124,77,255,0.2); }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- 顶部导航 -->
  <div class="nav-bar">
    <button class="nav-left">☰</button>
    <div class="nav-title">🌟 乐乐的星途</div>
    <div class="nav-capsule">
      <button class="nav-capsule-btn nav-capsule-new" title="新对话">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
      </button>
      <div class="nav-capsule-divider"></div>
      <button class="nav-capsule-btn" title="菜单">
        <div class="nav-capsule-dots"><span></span><span></span><span></span></div>
      </button>
    </div>
  </div>

  <!-- 消息区域 -->
  <div class="messages" id="messages">
    <!-- 卡通角色 -->
    <div class="mascot-area">
      <div class="mascot-container">
        <span class="mascot-star">⭐</span>
        <span class="mascot-deco">✨</span>
        <span class="mascot-deco">💫</span>
        <span class="mascot-deco">🌟</span>
      </div>
      <!-- 问候文字 -->
      <div class="greeting">早上好，乐乐妈妈 ☀️</div>
    </div>

    <!-- AI气泡 + 引导按钮 -->
    <div class="msg-row ai">
      <div class="avatar">
        <img src="https://api.dicebear.com/9.x/fun-emoji/svg?seed=starpath-ai&mouth=cute&eyes=cute" alt="AI">
      </div>
      <div class="bubble">
        <div class="bubble-text">今天想做点什么？我可以帮您：</div>
        <div class="guide-grid">
          <div class="guide-btn" data-text="开始训练">
            <span class="guide-emoji">🏋️</span>
            <div class="guide-info">
              <span class="guide-title">开始训练</span>
              <span class="guide-desc">安排今日训练计划</span>
            </div>
          </div>
          <div class="guide-btn" data-text="记录一下">
            <span class="guide-emoji">📝</span>
            <div class="guide-info">
              <span class="guide-title">记录一下</span>
              <span class="guide-desc">训练/生活/行为记录</span>
            </div>
          </div>
          <div class="guide-btn" data-text="做个筛查">
            <span class="guide-emoji">🧪</span>
            <div class="guide-info">
              <span class="guide-title">做个筛查</span>
              <span class="guide-desc">M-CHAT自闭症筛查</span>
            </div>
          </div>
          <div class="guide-btn" data-text="看看数据">
            <span class="guide-emoji">📊</span>
            <div class="guide-info">
              <span class="guide-title">看看数据</span>
              <span class="guide-desc">查看训练看板趋势</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 数据摘要条 -->
    <div class="stats-bar">
      <span class="stat-chip">连续训练 7天🔥</span>
      <span class="stat-chip">本周 14次训练</span>
      <span class="stat-chip">完成率 82%↑</span>
    </div>
  </div>

  <!-- 快捷操作横滑条 -->
  <div class="quick-actions">
    <button class="quick-btn">🏋️ 开始训练</button>
    <button class="quick-btn">📝 记录生活</button>
    <button class="quick-btn">📊 查看看板</button>
    <button class="quick-btn">🧪 做个筛查</button>
  </div>

  <!-- 输入栏 -->
  <div class="input-bar">
    <div class="input-wrap" id="inputWrap">
      <!-- 孩子切换弹窗 -->
      <div class="child-modal-overlay" id="childModal">
        <div class="child-modal">
          <div class="child-modal-title">切换咨询对象</div>
          <div class="child-option active" onclick="switchChild(this,'乐乐')">
            <div class="child-option-avatar" style="background:linear-gradient(135deg,#E8F5E9,#C8E6C9);">🧒</div>
            <div class="child-option-info">
              <div class="child-option-name">乐乐</div>
              <div class="child-option-desc">4岁3个月 · 男</div>
            </div>
            <div class="child-option-check"></div>
          </div>
          <div class="child-option" onclick="switchChild(this,'朵朵')">
            <div class="child-option-avatar" style="background:linear-gradient(135deg,#FCE4EC,#F8BBD0);">👧</div>
            <div class="child-option-info">
              <div class="child-option-name">朵朵</div>
              <div class="child-option-desc">6岁1个月 · 女</div>
            </div>
            <div class="child-option-check"></div>
          </div>
        </div>
      </div>
      <!-- 顶部行：语音 + 输入 + 加号 -->
      <div class="input-top">
        <button class="input-voice" title="语音输入">🎤</button>
        <textarea class="input-field" id="inputField" rows="1" placeholder="发消息或按住说话..."></textarea>
        <button class="input-add" title="拍照/相册">+</button>
      </div>
      <!-- 底部行：切换孩子 + 查看档案（聚焦时显示） -->
      <div class="input-bottom">
        <div class="child-switch" id="childSwitch">乐乐 ⇄</div>
        <button class="view-profile" id="viewProfile">查看档案 ›</button>
      </div>
    </div>
    <button class="send-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const inputWrap = document.getElementById('inputWrap');
const inputField = document.getElementById('inputField');
const childSwitch = document.getElementById('childSwitch');
const childModal = document.getElementById('childModal');

// 聚焦展开
inputField.addEventListener('focus', () => {
  inputWrap.classList.add('focused');
});

// 阻止底部按钮点击时触发 blur 收起
inputWrap.addEventListener('mousedown', (e) => {
  if (e.target !== inputField) {
    e.preventDefault();
  }
});

// 点击输入框外部才收起
document.addEventListener('click', (e) => {
  if (!inputWrap.contains(e.target) && !childModal.contains(e.target)) {
    inputWrap.classList.remove('focused');
    childModal.classList.remove('show');
  }
});

// textarea 自动增高
inputField.addEventListener('input', () => {
  inputField.style.height = 'auto';
  inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
});

// 切换孩子弹窗
childSwitch.addEventListener('click', (e) => {
  e.stopPropagation();
  childModal.classList.toggle('show');
});

function switchChild(el, name) {
  document.querySelectorAll('.child-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  childSwitch.textContent = name + ' ⇄';
  childModal.classList.remove('show');
  document.querySelector('.nav-title').innerHTML = '🌟 ' + name + '的星途';
}

// 引导按钮 → 填入输入框
document.querySelectorAll('.guide-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const text = btn.getAttribute('data-text');
    inputField.value = text;
    inputField.focus();
    inputField.dispatchEvent(new Event('input'));
  });
});

// 快捷按钮 → 填入输入框
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    inputField.value = btn.textContent.trim();
    inputField.focus();
    inputField.dispatchEvent(new Event('input'));
  });
});

// 发送
document.querySelector('.send-btn').addEventListener('click', () => {
  if (inputField.value.trim()) {
    inputField.value = '';
    inputField.style.height = 'auto';
    inputField.focus();
  }
});

// 回车发送（Shift+Enter 换行）
inputField.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    document.querySelector('.send-btn').click();
  }
});
</script>
</body>
</html>
