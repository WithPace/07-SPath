name: contract-governance-check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build contract artifacts
        run: bash governance/agent-contract/scripts/build-contract.sh

      - name: Verify contract artifacts
        run: bash governance/agent-contract/scripts/verify-contract.sh

      - name: Verify db and chain workflow gate
        run: bash tests/ci/test_workflow_presence.sh

      - name: Enforce no drift
        run: git diff --exit-code
