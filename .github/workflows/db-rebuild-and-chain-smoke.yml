name: db-rebuild-and-chain-smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
      DOUBAO_ENDPOINT_ID: ${{ secrets.DOUBAO_ENDPOINT_ID }}
      DOUBAO_MODEL: ${{ secrets.DOUBAO_MODEL }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
      KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
      DEFAULT_LLM: ${{ secrets.DEFAULT_LLM }}
      ALLOW_DESTRUCTIVE_REBUILD: "1"
      ALLOWED_PROJECT_REFS: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for key in SUPABASE_ACCESS_TOKEN SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD DOUBAO_API_KEY KIMI_API_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Build runtime .env
        run: |
          set -euo pipefail
          cat > .env <<EOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
          DOUBAO_API_KEY=${DOUBAO_API_KEY}
          DOUBAO_ENDPOINT_ID=${DOUBAO_ENDPOINT_ID}
          DOUBAO_MODEL=${DOUBAO_MODEL}
          KIMI_API_KEY=${KIMI_API_KEY}
          KIMI_BASE_URL=${KIMI_BASE_URL}
          KIMI_MODEL=${KIMI_MODEL}
          DEFAULT_LLM=${DEFAULT_LLM}
          EOF

      - name: Apply linked rebuild migration
        run: |
          set -euo pipefail
          bash scripts/db/rebuild_remote.sh
          # supabase db push --linked --include-all

      - name: Deploy current branch edge functions
        run: |
          set -euo pipefail
          supabase functions deploy orchestrator --project-ref "${SUPABASE_PROJECT_REF}" --use-api --no-verify-jwt
          supabase functions deploy chat-casual --project-ref "${SUPABASE_PROJECT_REF}" --use-api --no-verify-jwt

      - name: Live orchestrator chain smoke
        run: bash tests/e2e/test_orchestrator_chat_casual_live.sh
